# RentalSuite — nginx configuration for the frontend container
# Serves the Vite static build on port 3000.
# The external reverse proxy (host Nginx) forwards all non-/api traffic here.

server {
    listen 3000;

    root  /usr/share/nginx/html;
    index index.html;

    # React Router — redirect all 404s to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Aggressively cache immutable Vite assets (filenames include content hash)
    location ~* \.(?:js|css|woff2?|ttf|eot|otf|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Disable caching for the HTML entry point
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Gzip
    gzip            on;
    gzip_vary       on;
    gzip_types      text/plain text/css application/javascript application/json
                    application/x-javascript text/xml application/xml
                    application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1024;
}
