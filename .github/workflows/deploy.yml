name: Deploy to LXC

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Pull latest code
        run: git -C ~/rentcrm-pro pull origin main

      - name: Build API
        run: |
          cd ~/rentcrm-pro/apps/api
          npm install
          npx prisma generate
          npm run build

      - name: Install Frontend
        run: |
          cd ~/rentcrm-pro/apps/frontend
          npm install

      - name: Deploy containers
        run: |
          cd ~/rentcrm-pro
          docker compose up -d --build
          echo "Deploy completado: $(date)"
