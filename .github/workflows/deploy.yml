name: Build, push and deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  REPO: grisalenajm/rentcrm-pro

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.REPO }}/api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/frontend/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.REPO }}/frontend:latest
          build-args: |
            VITE_API_URL=/api
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to LXC via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.LXC_HOST }}
          username: ${{ secrets.LXC_USER }}
          key: ${{ secrets.LXC_SSH_KEY }}
          script: |
            cd ~/rentcrm-pro
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            echo "Deploy completado: $(date)"
