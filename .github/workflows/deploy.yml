name: Deploy to LXC

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Setup SSH agent
        run: |
          eval "$(ssh-agent -s)"
          ssh-add ~/.ssh/id_ed25519_write

      - name: Pull latest code
        run: git -C ~/rentcrm-pro fetch origin main && git -C ~/rentcrm-pro reset --hard origin/main

      - name: Deploy containers
        run: |
          cd ~/rentcrm-pro
          docker compose build --no-cache api
          docker compose up -d
          echo "Deploy completado: $(date)"
