name: Deploy to LXC

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH key
        env:
          SSH_KEY: ${{ secrets.LXC_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" | base64 -d > ~/.ssh/deploy_key 2>&1 || echo "base64 error: $?"
          ls -la ~/.ssh/deploy_key 2>&1 || echo "file not created"
          wc -c ~/.ssh/deploy_key 2>&1 || echo "empty file"
