name: Deploy to LXC

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Pull latest code
        run: git -C ~/rentcrm-pro pull origin main

      - name: Deploy
        run: |
          cd ~/rentcrm-pro
          docker compose up -d --build
          echo "Deploy completado: $(date)"
