# RentCRM Pro — Production Docker Compose
# Usage: docker compose -f docker-compose.prod.yml up -d
# Or via setup.sh for automated installation

services:
  postgres:
    image: postgres:16-alpine
    container_name: rentcrm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rentcrm}
      POSTGRES_USER: ${POSTGRES_USER:-rentcrm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rentcrm}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: rentcrm-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: rentcrm-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-3001}:3001"
    env_file: .env
    environment:
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: rentcrm-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    env_file: .env
    environment:
      NODE_ENV: production
    depends_on:
      - api

  libretranslate:
    image: libretranslate/libretranslate:latest
    container_name: rentcrm-translate
    restart: unless-stopped
    environment:
      - LT_LOAD_ONLY=es,en,fr,de,it,pt,nl,da,nb,sv
      - LT_DISABLE_WEB_UI=true
    volumes:
      - libretranslate_data:/home/libretranslate/.local

volumes:
  postgres_data:
  redis_data:
  libretranslate_data:
