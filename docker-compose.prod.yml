# RentalSuite — Production Docker Compose
# ─────────────────────────────────────────────────────────────────────────────
# Usage: docker compose -f docker-compose.prod.yml up -d --build
# All variables are read from .env in the project root.
#
# Network topology (external Nginx handles TLS termination):
#   https://your-domain.com/      → frontend:3000 (static build, served by nginx)
#   https://your-domain.com/api/* → api:3001       (NestJS)
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: rentcrm-postgres
    restart: always
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-rentcrm}
      POSTGRES_USER:     ${POSTGRES_USER:-rentcrm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      # Exposed on localhost only — required for host-side Prisma migrations.
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rentcrm}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: rentcrm-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── API (NestJS) ─────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: rentcrm-api
    restart: always
    ports:
      - "${API_PORT:-3001}:3001"
    env_file: .env
    environment:
      NODE_ENV: production
      # Constructed from individual credentials — no need to set these in .env
      DATABASE_URL: "postgresql://rentcrm:${POSTGRES_PASSWORD}@postgres:5432/rentcrm"
      REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Frontend (Vite static build served by nginx) ─────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile.prod
      args:
        VITE_API_URL: ${VITE_API_URL}
    container_name: rentcrm-frontend
    restart: always
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - api

  # ── LibreTranslate (self-hosted translation engine) ──────────────────────────
  libretranslate:
    image: libretranslate/libretranslate:latest
    container_name: rentcrm-translate
    restart: always
    environment:
      - LT_LOAD_ONLY=es,en,fr,de,it,pt,nl,da,nb,sv
      - LT_DISABLE_WEB_UI=true
    volumes:
      - libretranslate_data:/home/libretranslate/.local
    mem_limit: 1500m

volumes:
  postgres_data:
  redis_data:
  libretranslate_data:
