version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: rentcrm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: rentcrm
      POSTGRES_USER: rentcrm
      POSTGRES_PASSWORD: rentcrm
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rentcrm"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: rentcrm-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: rentcrm-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api:/app
      - /app/node_modules
      - ./certs:/certs:ro

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    container_name: rentcrm-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file: .env
    depends_on:
      - api

  ses-service:
    build:
      context: ./apps/ses-service
      dockerfile: Dockerfile
    container_name: rentcrm-ses
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./certs:/certs:ro

volumes:
  postgres_data:
