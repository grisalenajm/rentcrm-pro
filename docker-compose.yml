services:
  postgres:
    image: postgres:16-alpine
    container_name: rentcrm-postgres
    restart: unless-stopped
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rentcrm"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: rentcrm-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      network: host
    container_name: rentcrm-api
    volumes:
      - ./certs:/app/certs:ro
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file: .env
    environment:
      # Constructed from individual credentials — no need to set these in .env
      DATABASE_URL: "postgresql://rentcrm:${POSTGRES_PASSWORD}@postgres:5432/rentcrm"
      REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: rentcrm-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    env_file: .env
    depends_on:
      - api

  libretranslate:
    image: libretranslate/libretranslate:latest
    container_name: rentcrm-translate
    restart: "no"
    ports:
      - "5000:5000"
    environment:
      - LT_LOAD_ONLY=es,en,fr,de,it,pt,nl,da,nb,sv
      - LT_DISABLE_WEB_UI=true
    volumes:
      - libretranslate_data:/home/libretranslate/.local
    mem_limit: 1500m
    profiles:
      - translate

volumes:
  postgres_data:
  libretranslate_data:
